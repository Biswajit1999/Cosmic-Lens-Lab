name: Checks

on:
  push:
    branches: [feature-20260627]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm install --package-lock=false --registry=https://registry.npmjs.org/ --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: python -m pip install --upgrade pip
      - run: pip install -e ./python[dev]
      - run: npm run validate:python
