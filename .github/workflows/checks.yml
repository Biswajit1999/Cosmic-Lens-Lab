name: Checks

on:
  push:
    branches: [feature-20260627]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: python -m pip install pytest
      - run: npm run validate:python
