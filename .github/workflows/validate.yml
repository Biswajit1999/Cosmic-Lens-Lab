name: Validate lens laboratory

on:
  push:
    branches: [feature-20260627]
  pull_request:

permissions:
  contents: read

jobs:
  physics-and-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install workspace dependencies
        run: npm install
      - name: Preserve regenerated lockfile when dependencies change
        id: lockfile
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload regenerated lockfile
        if: steps.lockfile.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: regenerated-package-lock
          path: package-lock.json
          if-no-files-found: error
      - name: Typecheck workspaces
        run: npm run typecheck
      - name: Run TypeScript physics tests
        run: npm test
      - name: Run independent Python checks
        run: npm run validate:python
      - name: Build web application
        run: npm run build
