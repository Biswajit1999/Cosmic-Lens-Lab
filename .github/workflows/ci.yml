name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript build and tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm install --package-lock=false --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: Type-check TypeScript
        run: npm run typecheck

      - name: Run TypeScript tests
        run: npm test

      - name: Build web app
        run: npm run build

  python:
    name: Python validation tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation package
        run: |
          python -m pip install --upgrade pip
          pip install -e ./python[dev]

      - name: Run Python tests
        run: pytest python/tests -q
